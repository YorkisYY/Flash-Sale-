spring:
  application:
    name: flashsale-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flashsale}
    username: ${DB_USER:flashsale}
    password: ${DB_PASSWORD:flashsale}
    hikari:
      # Env-overridable so each deployment can size the pool to its connection
      # budget. Default 30 keeps local/docker-compose behaviour unchanged; the
      # Kubernetes ConfigMap lowers it (DB_POOL_SIZE=8) so replicas*pool stays
      # under Postgres max_connections — see k8s/README.md.
      maximum-pool-size: ${DB_POOL_SIZE:30}
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      group-id: order-writer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.flashsale.kafka
        spring.json.value.default.type: com.flashsale.kafka.OrderRequestedEvent
    listener:
      ack-mode: manual

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

# --- Actuator / Kubernetes probes ---
# Liveness  -> /actuator/health/liveness   ("is the app process healthy?")
# Readiness -> /actuator/health/readiness  ("should this pod receive traffic?")
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        # Force the liveness/readiness probe groups on in every environment
        # (Spring only auto-enables them when it detects Kubernetes).
        enabled: true
      group:
        liveness:
          # Liveness deliberately contains ONLY livenessState — never a
          # dependency. A failed liveness probe makes Kubernetes RESTART the
          # pod, which cannot fix an external outage (DB/Redis/Kafka down) and
          # would cause restart storms. Liveness fails only if the app itself
          # is broken.
          include: livenessState
        readiness:
          # Readiness gates traffic. Postgres is REQUIRED (source of truth +
          # final oversell defense): if it is unreachable this pod cannot serve
          # correctly, so `db` is in the group and the pod drops out of the
          # Service endpoints until the DB returns.
          #
          # Redis and Kafka are deliberately EXCLUDED. The app degrades
          # gracefully without them (DB-only inventory path; no-op Kafka
          # publish), so an outage of either must NOT pull the pod from
          # rotation — it can still serve in degraded mode. They still appear
          # in the aggregate /actuator/health, just not in the readiness probe.
          include: readinessState,db

flashsale:
  scheduler:
    # When false, this instance registers NO @Scheduled timers — the
    # SchedulerTriggers bean is not created. The dedicated scheduler Deployment
    # runs with true (replicas=1, owns the timers); the traffic-serving backend
    # Deployment runs with false. Default true preserves single-node /
    # docker-compose behaviour.
    enabled: ${SCHEDULER_ENABLED:true}
  order:
    reservation-ttl-minutes: ${RESERVATION_TTL_MINUTES:15}
    expiry-scan-interval-ms: ${EXPIRY_SCAN_INTERVAL_MS:60000}
  inventory:
    # Was previously only the @Scheduled annotation default; surfaced here so
    # it is explicit and env-overridable via the ConfigMap.
    reconcile-interval-ms: ${RECONCILE_INTERVAL_MS:60000}
  payment:
    payuni:
      merchant-id: ${PAYUNI_MERCHANT_ID:}
      hash-key: ${PAYUNI_HASH_KEY:}
      hash-iv: ${PAYUNI_HASH_IV:}
      env: ${PAYUNI_ENV:test}
      return-url: ${PAYUNI_RETURN_URL:http://localhost:8080/api/payments/payuni/callback}
      notify-url: ${PAYUNI_NOTIFY_URL:http://localhost:8080/api/payments/payuni/callback}
      frontend-result-url: ${PAYUNI_FRONTEND_RESULT_URL:http://localhost:3000/result}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      currency: ${STRIPE_CURRENCY:twd}
      success-url: ${STRIPE_SUCCESS_URL:http://localhost:3000/result}
      cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3000/result}
    ecpay:
      # Defaults are ECPay's currently-published stage test merchant
      # (developers.ecpay.com.tw — CheckMacValue generation page). The
      # earlier 2000132 / 20-char-key pair was rejected by the stage server
      # with 10200073; don't put it back without confirming end-to-end.
      merchant-id: ${ECPAY_MERCHANT_ID:3002607}
      hash-key:    ${ECPAY_HASH_KEY:pwFHCqoQZGmho4w6}
      hash-iv:     ${ECPAY_HASH_IV:EkRm7iFT261dpevs}
      api-url:     ${ECPAY_API_URL:https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5}
      return-url:  ${ECPAY_RETURN_URL:http://localhost:8080/api/payments/ecpay/callback}
      order-result-url: ${ECPAY_ORDER_RESULT_URL:http://localhost:3000/result}
      client-back-url:  ${ECPAY_CLIENT_BACK_URL:http://localhost:3000}

logging:
  level:
    com.flashsale: INFO
    org.hibernate.SQL: WARN
