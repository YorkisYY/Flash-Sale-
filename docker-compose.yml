services:
  postgres:
    image: postgres:16-alpine
    container_name: flashsale-postgres
    environment:
      POSTGRES_DB: flashsale
      POSTGRES_USER: flashsale
      POSTGRES_PASSWORD: flashsale
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsale"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: flashsale-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Topic auto-create is OFF; orders.requested is created declaratively by
      # the backend (TopicBuilder bean in KafkaConfig).
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashsale-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flashsale
      DB_USER: flashsale
      DB_PASSWORD: flashsale
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PAYUNI_MERCHANT_ID: ${PAYUNI_MERCHANT_ID:-}
      PAYUNI_HASH_KEY:    ${PAYUNI_HASH_KEY:-}
      PAYUNI_HASH_IV:     ${PAYUNI_HASH_IV:-}
      PAYUNI_ENV:         ${PAYUNI_ENV:-test}
      PAYUNI_RETURN_URL:  ${PAYUNI_RETURN_URL:-http://localhost:8080/api/payments/payuni/callback}
      PAYUNI_NOTIFY_URL:  ${PAYUNI_NOTIFY_URL:-http://localhost:8080/api/payments/payuni/callback}
      PAYUNI_FRONTEND_RESULT_URL: ${PAYUNI_FRONTEND_RESULT_URL:-http://localhost:3000/result}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY:       ${STRIPE_CURRENCY:-twd}
      STRIPE_SUCCESS_URL:    ${STRIPE_SUCCESS_URL:-http://localhost:3000/result}
      STRIPE_CANCEL_URL:     ${STRIPE_CANCEL_URL:-http://localhost:3000/result}
      ECPAY_MERCHANT_ID:     ${ECPAY_MERCHANT_ID:-3002607}
      ECPAY_HASH_KEY:        ${ECPAY_HASH_KEY:-pwFHCqoQZGmho4w6}
      ECPAY_HASH_IV:         ${ECPAY_HASH_IV:-EkRm7iFT261dpevs}
      ECPAY_API_URL:         ${ECPAY_API_URL:-https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5}
      ECPAY_RETURN_URL:      ${ECPAY_RETURN_URL:-http://localhost:8080/api/payments/ecpay/callback}
      ECPAY_ORDER_RESULT_URL: ${ECPAY_ORDER_RESULT_URL:-http://localhost:3000/result}
      ECPAY_CLIENT_BACK_URL: ${ECPAY_CLIENT_BACK_URL:-http://localhost:3000}
      KAFKA_BROKERS:         ${KAFKA_BROKERS:-kafka:9092}
      # Production-secure default OFF. Set to "true" only behind a proxy
      # that overwrites X-Forwarded-For (Nginx: proxy_set_header X-Forwarded-For
      # $remote_addr;). Load tests flip this on so per-VU XFF buckets work.
      FLASHSALE_RATELIMIT_TRUST-FORWARDED-HEADER: ${FLASHSALE_RATELIMIT_TRUST_FORWARDED_HEADER:-false}
      FLASHSALE_RATELIMIT_MAX-ATTEMPTS:           ${FLASHSALE_RATELIMIT_MAX_ATTEMPTS:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flashsale-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
