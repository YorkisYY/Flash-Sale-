apiVersion: v1
kind: Secret
metadata:
  name: flashsale-secrets
  labels:
    app.kubernetes.io/part-of: flashsale
type: Opaque
# ============================================================================
# PLACEHOLDERS ONLY — this file is committed to git. Every value is REPLACE_ME.
#
# Do NOT put real credentials here. Instead:
#   1. cp k8s/secret.yaml k8s/secret.local.yaml
#   2. fill real values in secret.local.yaml
#   3. kubectl apply -f k8s/secret.local.yaml
# k8s/secret.local.yaml is gitignored (see repo .gitignore) so real values
# never reach the repo. See k8s/README.md.
#
# DB_PASSWORD is shared: the Postgres Deployment reads the same key for
# POSTGRES_PASSWORD, so the two always agree.
# ============================================================================
stringData:
  DB_PASSWORD: "REPLACE_ME"
  STRIPE_SECRET_KEY: "REPLACE_ME"
  STRIPE_WEBHOOK_SECRET: "REPLACE_ME"
  ECPAY_HASH_KEY: "REPLACE_ME"
  ECPAY_HASH_IV: "REPLACE_ME"
  PAYUNI_HASH_KEY: "REPLACE_ME"
  PAYUNI_HASH_IV: "REPLACE_ME"
